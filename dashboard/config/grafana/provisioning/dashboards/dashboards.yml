# Dashboard provider — auto-loads every JSON dashboard placed in
# /var/lib/grafana/dashboards (mounted from config/grafana/dashboards).
apiVersion: 1

providers:
  - name: VitiScience
    orgId: 1
    folder: VitiScience
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
