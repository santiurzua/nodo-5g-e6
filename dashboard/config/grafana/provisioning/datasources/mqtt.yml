# MQTT datasource — the REAL-TIME path ("cable from the broker to your computer").
# Grafana subscribes straight to Mosquitto and streams new messages to the browser
# via Grafana Live. Provided by the experimental grafana-mqtt-datasource plugin
# (installed via GF_INSTALL_PLUGINS in docker-compose.yml).
#
# Note: this datasource talks to the broker over plain TCP (1883) from inside the
# Docker network, so it uses the service name `mosquitto`.
apiVersion: 1

datasources:
  - name: MQTT
    uid: vitiscience-mqtt
    type: grafana-mqtt-datasource
    access: proxy
    jsonData:
      uri: tcp://mosquitto:1883
    editable: true
