# Telegraf: bridge from MQTT to InfluxDB.
#
# It subscribes to every node's telemetry topic, decodes the JSON payload defined
# in docs/data-contract.md, and writes one point per message into InfluxDB.

[agent]
  # Flush quickly so the dashboard's historical view feels near-live too.
  interval = "5s"
  flush_interval = "5s"
  omit_hostname = true

# --- INPUT: MQTT --------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]

  # Wildcard over all nodes:  vitiscience/nodes/<node_id>/telemetry
  topics = ["vitiscience/nodes/+/telemetry"]
  qos = 1
  client_id = "telegraf-vitiscience"

  # Payload is a single JSON object (see telemetry.schema.json).
  data_format = "json"

  # Force the InfluxDB measurement name regardless of topic.
  name_override = "telemetry"

  # node_id becomes a tag (everything else numeric becomes a field).
  tag_keys = ["node_id"]

  # Use the message's own timestamp when present; otherwise Telegraf uses arrival time.
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"

  # Only these numeric keys are kept as fields.
  json_string_fields = []

# --- OUTPUT: InfluxDB v2 ------------------------------------------------------
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
