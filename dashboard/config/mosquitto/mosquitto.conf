# Mosquitto broker: VitiScience prototype.
#
# One listener:
#   1883 : plain MQTT (TCP) - publishers (simulator / real gateway) and Telegraf.
#
# Anonymous access is enabled for the prototype only. Before field deployment,
# set `allow_anonymous false` and add a password_file (see docs/data-contract.md section 5).

persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` shows activity.
log_dest stdout
log_type warning
log_type notice
log_type information

# TCP listener
listener 1883
protocol mqtt

allow_anonymous true
