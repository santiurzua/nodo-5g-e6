# Mosquitto broker — VitiScience prototype.
#
# Two listeners:
#   1883 : plain MQTT (TCP)  — publishers (simulator / real gateway) and Telegraf.
#   9001 : MQTT over WebSocket — Grafana Live / browser real-time path.
#
# Anonymous access is enabled for the prototype only. Before field deployment,
# set `allow_anonymous false` and add a password_file (see docs/data-contract.md §5).

persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` shows activity.
log_dest stdout
log_type warning
log_type notice
log_type information

# --- TCP listener -------------------------------------------------------------
listener 1883
protocol mqtt

# --- WebSocket listener (real-time browser/Grafana Live) ----------------------
listener 9001
protocol websockets

allow_anonymous true
