# VitiScience: storage + visualization stack.
#
# One command brings up the whole pipeline:  docker compose up -d
# Identical on a Windows dev box (Docker Desktop) and on the Raspberry Pi 4
# (arm64): every image below is multi-arch.
#
#   Mosquitto  : MQTT broker. Publishers (simulator / real gateway) connect here.
#   Telegraf   : subscribes to MQTT and writes each reading into InfluxDB.
#   InfluxDB   : time-series DB, 3-day retention bucket = the historical buffer.
#   Grafana    : dashboard. Reads history from InfluxDB (Flux, 5s auto-refresh).

name: vitiscience-dashboard

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: vitiscience-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_TCP_PORT:-1883}:1883"   # TCP: publishers and Telegraf
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      # mosquitto_sub ships inside the image; a 2s connect proves the broker is up.
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 2 -h localhost >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  influxdb:
    image: influxdb:2.7
    container_name: vitiscience-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  telegraf:
    image: telegraf:1.32
    container_name: vitiscience-telegraf
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    volumes:
      - ./config/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: vitiscience-grafana
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      # Values consumed by the provisioned datasources (see config/grafana/provisioning).
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mosquitto-data:
  influxdb-data:
  influxdb-config:
  grafana-data:
